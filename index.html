<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동향 모니터링</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; background: #0f1117; color: #e0e0e0; min-height: 100vh; }

        header { background: #1a1d2e; border-bottom: 1px solid #2a2d3e; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .header-logo { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
        header h1 { font-size: 15px; font-weight: 700; color: #fff; }
        .header-sub { font-size: 10px; color: #555; margin-top: 2px; }
        .update-time { font-size: 11px; color: #666; }

        .tab-bar { background: #1a1d2e; border-bottom: 1px solid #2a2d3e; padding: 0 20px; display: flex; }
        .tab-btn { padding: 12px 18px; font-size: 13px; font-weight: 600; color: #666; background: transparent; border: none; border-bottom: 2px solid transparent; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
        .tab-btn:hover { color: #aaa; }
        .tab-btn.active { color: #4f8ef7; border-bottom-color: #4f8ef7; }

        .container { max-width: 1400px; margin: 0 auto; padding: 16px 20px; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* 키워드 카드 */
        .keyword-card { background: #1a1d2e; border: 1px solid #2a2d3e; border-radius: 10px; padding: 14px 18px; margin-bottom: 16px; }
        .keyword-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .keyword-title { font-size: 11px; font-weight: 600; color: #aaa; }
        .keyword-nav { display: flex; align-items: center; gap: 10px; }
        .keyword-nav-btn { background: transparent; border: 1px solid #2a2d3e; color: #666; border-radius: 6px; padding: 3px 10px; cursor: pointer; font-size: 13px; transition: all 0.15s; }
        .keyword-nav-btn:hover { border-color: #4f8ef7; color: #fff; }
        .keyword-nav-btn:disabled { opacity: 0.2; cursor: not-allowed; }
        .keyword-month-label { font-size: 13px; font-weight: 600; color: #fff; min-width: 80px; text-align: center; }
        .keyword-tags { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .keyword-tag { display: flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: 20px; background: #0f1117; border: 1px solid #2a2d3e; }
        .keyword-rank { font-size: 10px; color: #555; font-weight: 700; }
        .keyword-word { font-size: 13px; font-weight: 700; }
        .keyword-count { font-size: 10px; color: #4fcff7; }
        .keyword-tag:nth-child(1) { border-color: #f7c94f44; }
        .keyword-tag:nth-child(1) .keyword-word { color: #f7c94f; }
        .keyword-tag:nth-child(2) { border-color: #4fcff744; }
        .keyword-tag:nth-child(2) .keyword-word { color: #4fcff7; }
        .keyword-tag:nth-child(3) { border-color: #a14ff744; }
        .keyword-tag:nth-child(3) .keyword-word { color: #a14ff7; }
        .keyword-tag:nth-child(4) { border-color: #4ff77a44; }
        .keyword-tag:nth-child(4) .keyword-word { color: #4ff77a; }
        .keyword-tag:nth-child(5) { border-color: #f7844f44; }
        .keyword-tag:nth-child(5) .keyword-word { color: #f7844f; }
        .keyword-empty { font-size: 12px; color: #555; padding: 4px 0; }

        /* 메트릭 카드 */
        .metric-row { display: grid; gap: 10px; margin-bottom: 16px; }
        .metric-row.cols-5 { grid-template-columns: repeat(5, 1fr); }
        .metric-row.cols-3 { grid-template-columns: repeat(3, 1fr); }
        .metric { background: #1a1d2e; border: 1px solid #2a2d3e; border-radius: 10px; padding: 14px 16px; transition: border-color 0.2s; }
        .metric:hover { border-color: #4f8ef7; }
        .metric-label { font-size: 11px; color: #888; margin-bottom: 6px; display: flex; align-items: center; gap: 5px; }
        .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
        .metric-value { font-size: 22px; font-weight: 700; color: #fff; }
        .metric-sub { font-size: 10px; color: #4fcff7; margin-top: 3px; }

        /* 차트 */
        .chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
        .chart-card { background: #1a1d2e; border: 1px solid #2a2d3e; border-radius: 10px; padding: 16px; }
        .chart-title { font-size: 11px; font-weight: 600; color: #aaa; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        .legend-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #aaa; }
        .legend-sq { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

        /* 뉴스 */
        .news-card { background: #1a1d2e; border: 1px solid #2a2d3e; border-radius: 10px; padding: 16px; }
        .news-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
        .news-card-title { font-size: 11px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }
        .filter-bar { display: flex; gap: 5px; flex-wrap: wrap; }
        .f-btn { font-size: 11px; padding: 4px 10px; border-radius: 12px; border: 1px solid #2a2d3e; background: transparent; color: #888; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
        .f-btn:hover { border-color: #4f8ef7; color: #fff; }
        .f-btn.on { background: #4f8ef7; border-color: #4f8ef7; color: #fff; }

        .news-item { display: flex; align-items: center; gap: 8px; padding: 10px 0; border-bottom: 1px solid #22253a; }
        .news-item:last-child { border-bottom: none; }
        .news-tag { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 10px; white-space: nowrap; flex-shrink: 0; }
        .source-badge { font-size: 10px; padding: 2px 7px; border-radius: 8px; white-space: nowrap; flex-shrink: 0; }
        .news-text { font-size: 13px; color: #ccc; line-height: 1.5; flex: 1; text-decoration: none; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .news-text:hover { color: #fff; }
        .news-date { font-size: 11px; color: #555; white-space: nowrap; flex-shrink: 0; }

        /* 페이지네이션 */
        .pagination { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 16px; flex-wrap: wrap; }
        .page-btn { font-size: 12px; padding: 6px 12px; border-radius: 8px; border: 1px solid #2a2d3e; background: transparent; color: #888; cursor: pointer; transition: all 0.15s; }
        .page-btn:hover { border-color: #4f8ef7; color: #fff; }
        .page-btn.on { background: #4f8ef7; border-color: #4f8ef7; color: #fff; }
        .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .page-info { font-size: 11px; color: #555; }

        .empty { text-align: center; padding: 40px; font-size: 13px; color: #555; }

        /* 모바일 */
        @media (max-width: 768px) {
            header h1 { font-size: 13px; }
            .header-logo { width: 28px; height: 28px; }
            .update-time { display: none; }
            .tab-btn { padding: 10px 14px; font-size: 12px; }
            .container { padding: 12px 16px; }

            .keyword-header { flex-wrap: wrap; gap: 8px; }
            .keyword-tags { gap: 6px; }
            .keyword-tag { padding: 4px 10px; }
            .keyword-word { font-size: 12px; }

            .metric-row.cols-5 { grid-template-columns: repeat(2, 1fr); }
            .metric-row.cols-3 { grid-template-columns: repeat(3, 1fr); }
            .metric { padding: 12px 14px; }
            .metric-value { font-size: 20px; }

            .chart-row { grid-template-columns: 1fr; gap: 10px; }
            .chart-card { padding: 14px; }

            .news-item { flex-direction: column; align-items: flex-start; gap: 5px; padding: 12px 0; }
            .news-item-row1 { display: flex; align-items: center; gap: 6px; width: 100%; }
            .news-item-row2 { display: flex; align-items: flex-start; justify-content: space-between; width: 100%; gap: 8px; }
            .news-text { white-space: normal; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
            .news-date { font-size: 10px; flex-shrink: 0; margin-top: 2px; }

            .news-header { flex-direction: column; align-items: flex-start; }
            .filter-bar { width: 100%; overflow-x: auto; flex-wrap: nowrap; padding-bottom: 4px; }
            .f-btn { flex-shrink: 0; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <img src="./logo.png" alt="로고" class="header-logo">
        <div>
            <h1>동향 모니터링</h1>
            <div class="header-sub">컨설팅사업부 · 황채운 대리</div>
        </div>
    </div>
    <div class="update-time" id="updateTime">로딩 중...</div>
</header>

<div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('competitor', this)">📊 경쟁사 동향</button>
    <button class="tab-btn" onclick="switchTab('trend', this)">🔬 기술 트렌드</button>
</div>

<div class="container">

    <!-- 탭1: 경쟁사 -->
    <div id="panel-competitor" class="tab-panel active">
        <div class="keyword-card" id="competitorKeywordCard">
            <div class="keyword-header">
                <div class="keyword-title">🔥 핵심 키워드</div>
                <div class="keyword-nav">
                    <button class="keyword-nav-btn" id="cKeywordPrev" onclick="moveKeywordMonth('c', -1)">◀</button>
                    <div class="keyword-month-label" id="cKeywordMonth"></div>
                    <button class="keyword-nav-btn" id="cKeywordNext" onclick="moveKeywordMonth('c', 1)">▶</button>
                </div>
            </div>
            <div class="keyword-tags" id="cKeywordTags"></div>
        </div>
        <div class="metric-row cols-5" id="competitorMetrics"></div>
        <div class="chart-row">
            <div class="chart-card">
                <div class="chart-title">회사별 기사 비중</div>
                <div style="position:relative; height:180px;">
                    <canvas id="donutChart" role="img" aria-label="회사별 기사 비중">회사별 기사 비중</canvas>
                </div>
                <div class="legend-row" id="donutLegend"></div>
            </div>
            <div class="chart-card">
                <div class="chart-title">회사별 수집 건수</div>
                <div style="position:relative; height:180px;">
                    <canvas id="barChart" role="img" aria-label="회사별 수집 건수">회사별 수집 건수</canvas>
                </div>
            </div>
        </div>
        <div class="news-card">
            <div class="news-header">
                <div class="news-card-title">최신 기사</div>
                <div class="filter-bar" id="competitorFilter"></div>
            </div>
            <div id="competitorNews"></div>
            <div class="pagination" id="competitorPagination"></div>
        </div>
    </div>

    <!-- 탭2: 기술 트렌드 -->
    <div id="panel-trend" class="tab-panel">
        <div class="keyword-card" id="trendKeywordCard">
            <div class="keyword-header">
                <div class="keyword-title">🔥 핵심 키워드</div>
                <div class="keyword-nav">
                    <button class="keyword-nav-btn" id="tKeywordPrev" onclick="moveKeywordMonth('t', -1)">◀</button>
                    <div class="keyword-month-label" id="tKeywordMonth"></div>
                    <button class="keyword-nav-btn" id="tKeywordNext" onclick="moveKeywordMonth('t', 1)">▶</button>
                </div>
            </div>
            <div class="keyword-tags" id="tKeywordTags"></div>
        </div>
        <div class="metric-row cols-3" id="trendMetrics"></div>
        <div class="chart-row">
            <div class="chart-card">
                <div class="chart-title">키워드별 기사 비중</div>
                <div style="position:relative; height:180px;">
                    <canvas id="trendDonut" role="img" aria-label="키워드별 기사 비중">키워드별 기사 비중</canvas>
                </div>
                <div class="legend-row" id="trendLegend"></div>
            </div>
            <div class="chart-card">
                <div class="chart-title">키워드별 수집 건수</div>
                <div style="position:relative; height:180px;">
                    <canvas id="trendBar" role="img" aria-label="키워드별 수집 건수">키워드별 수집 건수</canvas>
                </div>
            </div>
        </div>
        <div class="news-card">
            <div class="news-header">
                <div class="news-card-title">최신 기사</div>
                <div class="filter-bar" id="trendFilter"></div>
            </div>
            <div id="trendNews"></div>
            <div class="pagination" id="trendPagination"></div>
        </div>
    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
    const COMPANIES = ["시큐아이","안랩","넥스지","퓨처시스템","윈스"];
    const TRENDS    = ["AI보안","PQC","제로트러스트"];
    const PAGE_SIZE = 30;

    const C_COLORS = {
        "시큐아이":   { hex:"#e84393", bg:"#e8439322", text:"#e84393" },
        "안랩":       { hex:"#f7844f", bg:"#f7844f22", text:"#f7844f" },
        "넥스지":     { hex:"#4fcff7", bg:"#4fcff722", text:"#4fcff7" },
        "퓨처시스템": { hex:"#a14ff7", bg:"#a14ff722", text:"#a14ff7" },
        "윈스":       { hex:"#4ff77a", bg:"#4ff77a22", text:"#4ff77a" }
    };
    const T_COLORS = {
        "AI보안":      { hex:"#f7c94f", bg:"#f7c94f22", text:"#f7c94f" },
        "PQC":         { hex:"#4f8ef7", bg:"#4f8ef722", text:"#4f8ef7" },
        "제로트러스트": { hex:"#f74f4f", bg:"#f74f4f22", text:"#f74f4f" }
    };
    const SOURCE_MAP = {
        "공식블로그": { label:"블로그", color:"#f7c94f" },
        "구글뉴스":   { label:"뉴스",   color:"#4fcff7" },
        "네이버뉴스": { label:"뉴스",   color:"#4fcff7" },
    };

    let competitorData = [], trendData = [];
    let cMonthlyKeywords = {}, tMonthlyKeywords = {};
    let cMonthIndex = 0, tMonthIndex = 0;
    let cMonthKeys  = [], tMonthKeys  = [];
    let cFilter = "전체", tFilter = "전체";
    let cPage = 1, tPage = 1;
    const IS_MOBILE = window.innerWidth <= 768;

    // ── 데이터 로드 ───────────────────────────
    fetch('./data.json?t=' + Date.now())
        .then(r => r.json())
        .then(data => {
            competitorData   = data.competitor || [];
            trendData        = data.trend || [];
            cMonthlyKeywords = data.competitor_monthly_keywords || {};
            tMonthlyKeywords = data.trend_monthly_keywords || {};

            // 월 목록 최신순 정렬
            cMonthKeys = Object.keys(cMonthlyKeywords).sort().reverse();
            tMonthKeys = Object.keys(tMonthlyKeywords).sort().reverse();

            document.getElementById('updateTime').textContent =
                `업데이트: ${data.updated || ""}`;

            renderKeywordCard('c');
            renderKeywordCard('t');
            renderCompetitor();
            renderTrend();
        })
        .catch(() => {
            document.getElementById('competitorNews').innerHTML =
                '<div class="empty">⚠️ data.json을 불러올 수 없습니다.<br>Actions 탭에서 로봇을 먼저 실행해주세요.</div>';
        });

    // ── 탭 전환 ──────────────────────────────
    function switchTab(tab, btn) {
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('panel-' + tab).classList.add('active');
        btn.classList.add('active');
    }

    // ── 키워드 카드 렌더 ─────────────────────
    function renderKeywordCard(prefix) {
        const monthKeys  = prefix === 'c' ? cMonthKeys : tMonthKeys;
        const monthIndex = prefix === 'c' ? cMonthIndex : tMonthIndex;
        const monthly    = prefix === 'c' ? cMonthlyKeywords : tMonthlyKeywords;

        if (!monthKeys.length) return;

        const currentMonth    = monthKeys[monthIndex];
        const keywords        = monthly[currentMonth] || [];
        const [year, month]   = currentMonth.split('-');
        const monthLabel      = `${year}년 ${parseInt(month)}월`;

        document.getElementById(`${prefix}KeywordMonth`).textContent = monthLabel;

        // 화살표 버튼 활성/비활성
        document.getElementById(`${prefix}KeywordPrev`).disabled = monthIndex >= monthKeys.length - 1;
        document.getElementById(`${prefix}KeywordNext`).disabled = monthIndex <= 0;

        const tagsEl = document.getElementById(`${prefix}KeywordTags`);
        if (!keywords.length) {
            tagsEl.innerHTML = '<span class="keyword-empty">이 달은 데이터가 없습니다.</span>';
            return;
        }

        tagsEl.innerHTML = keywords.map((k, i) => `
            <div class="keyword-tag">
                <span class="keyword-rank">${i + 1}</span>
                <span class="keyword-word">${k.keyword}</span>
                <span class="keyword-count">${k.count}회</span>
            </div>
        `).join('');
    }

    function moveKeywordMonth(prefix, dir) {
        if (prefix === 'c') {
            cMonthIndex = Math.max(0, Math.min(cMonthKeys.length - 1, cMonthIndex + dir * -1));
        } else {
            tMonthIndex = Math.max(0, Math.min(tMonthKeys.length - 1, tMonthIndex + dir * -1));
        }
        renderKeywordCard(prefix);
    }

    // ── 경쟁사 탭 ────────────────────────────
    function renderCompetitor() {
        renderMetrics('competitorMetrics', COMPANIES, competitorData, 'company', C_COLORS);
        renderDonut('donutChart', 'donutLegend', COMPANIES, competitorData, 'company', C_COLORS);
        renderBar('barChart', COMPANIES, competitorData, 'company', C_COLORS);
        renderFilterBtns('competitorFilter', ["전체", ...COMPANIES], 'c');
        renderNewsList('competitorNews', 'competitorPagination', getFiltered('c'), 'company', C_COLORS, cPage);
    }

    // ── 트렌드 탭 ────────────────────────────
    function renderTrend() {
        renderMetrics('trendMetrics', TRENDS, trendData, 'category', T_COLORS);
        renderDonut('trendDonut', 'trendLegend', TRENDS, trendData, 'category', T_COLORS);
        renderBar('trendBar', TRENDS, trendData, 'category', T_COLORS);
        renderFilterBtns('trendFilter', ["전체", ...TRENDS], 't');
        renderNewsList('trendNews', 'trendPagination', getFiltered('t'), 'category', T_COLORS, tPage);
    }

    // ── 필터된 데이터 ─────────────────────────
    function getFiltered(prefix) {
        if (prefix === 'c') {
            return cFilter === "전체" ? competitorData : competitorData.filter(d => d.company === cFilter);
        } else {
            return tFilter === "전체" ? trendData : trendData.filter(d => d.category === tFilter);
        }
    }

    // ── 메트릭 카드 ──────────────────────────
    function renderMetrics(elId, keys, data, field, colors) {
        const today = new Date().toLocaleDateString('ko-KR', {
            timeZone: 'Asia/Seoul',
            year: 'numeric', month: '2-digit', day: '2-digit'
        }).replace(/\. /g, '-').replace('.', '').trim();

        document.getElementById(elId).innerHTML = keys.map(k => {
            const total    = data.filter(d => d[field] === k).length;
            const todayCnt = data.filter(d => d[field] === k && (d.date||'').startsWith(today)).length;
            const col = colors[k];
            return `<div class="metric">
                <div class="metric-label">
                    <span class="dot" style="background:${col.hex}"></span>${k}
                </div>
                <div class="metric-value">${total}</div>
                <div class="metric-sub">오늘 ${todayCnt}건</div>
            </div>`;
        }).join('');
    }

    // ── 도넛 차트 ────────────────────────────
    function renderDonut(canvasId, legendId, keys, data, field, colors) {
        const counts = keys.map(k => data.filter(d => d[field] === k).length);
        const hexes  = keys.map(k => colors[k].hex);
        const total  = counts.reduce((a, b) => a + b, 0);
        const existing = Chart.getChart(canvasId);
        if (existing) existing.destroy();

        new Chart(document.getElementById(canvasId), {
            type: 'doughnut',
            data: {
                labels: keys,
                datasets: [{
                    data: counts,
                    backgroundColor: hexes,
                    borderWidth: 2,
                    borderColor: '#1a1d2e',
                    hoverOffset: 6
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false, cutout: '65%',
                animation: { duration: 400 },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: ctx => {
                                const p = total > 0 ? Math.round(ctx.raw / total * 100) : 0;
                                return ` ${ctx.raw}건 (${p}%)`;
                            }
                        }
                    }
                }
            }
        });

        document.getElementById(legendId).innerHTML = keys.map((k, i) => {
            const p = total > 0 ? Math.round(counts[i] / total * 100) : 0;
            return `<span class="legend-item">
                <span class="legend-sq" style="background:${hexes[i]}"></span>${k} ${p}%
            </span>`;
        }).join('');
    }

    // ── 막대 차트 ────────────────────────────
    function renderBar(canvasId, keys, data, field, colors) {
        const counts = keys.map(k => data.filter(d => d[field] === k).length);
        const hexes  = keys.map(k => colors[k].hex);
        const existing = Chart.getChart(canvasId);
        if (existing) existing.destroy();

        new Chart(document.getElementById(canvasId), {
            type: 'bar',
            data: {
                labels: keys,
                datasets: [{
                    data: counts,
                    backgroundColor: hexes,
                    borderRadius: 5,
                    borderSkipped: false
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                animation: { duration: 400 },
                plugins: { legend: { display: false } },
                scales: {
                    x: {
                        grid: { display: false },
                        ticks: { color: '#666', font: { size: IS_MOBILE ? 10 : 11 }, maxRotation: IS_MOBILE ? 30 : 0 }
                    },
                    y: {
                        beginAtZero: true,
                        grid: { color: 'rgba(255,255,255,0.05)' },
                        ticks: { color: '#666', font: { size: 11 }, stepSize: 1 }
                    }
                }
            }
        });
    }

    // ── 필터 버튼 ────────────────────────────
    function renderFilterBtns(elId, labels, prefix) {
        const current = prefix === 'c' ? cFilter : tFilter;
        document.getElementById(elId).innerHTML = labels.map(l =>
            `<button class="f-btn ${l === current ? 'on' : ''}"
                onclick="setFilter('${prefix}','${l}')">${l}</button>`
        ).join('');
    }

    function setFilter(prefix, val) {
        if (prefix === 'c') {
            cFilter = val; cPage = 1;
            renderFilterBtns('competitorFilter', ["전체", ...COMPANIES], 'c');
            renderNewsList('competitorNews', 'competitorPagination', getFiltered('c'), 'company', C_COLORS, cPage);
        } else {
            tFilter = val; tPage = 1;
            renderFilterBtns('trendFilter', ["전체", ...TRENDS], 't');
            renderNewsList('trendNews', 'trendPagination', getFiltered('t'), 'category', T_COLORS, tPage);
        }
    }

    // ── 뉴스 목록 + 페이지네이션 ─────────────
    function renderNewsList(elId, pageElId, data, field, colors, page) {
        const el     = document.getElementById(elId);
        const pageEl = document.getElementById(pageElId);

        if (!data.length) {
            el.innerHTML     = '<div class="empty">📭 수집된 기사가 없습니다.</div>';
            pageEl.innerHTML = '';
            return;
        }

        const totalPages = Math.ceil(data.length / PAGE_SIZE);
        const start      = (page - 1) * PAGE_SIZE;
        const pageData   = data.slice(start, start + PAGE_SIZE);

        el.innerHTML = pageData.map(item => {
            const key  = item[field];
            const col  = colors[key] || { hex:'#888', bg:'#88888822', text:'#888' };
            const src  = SOURCE_MAP[item.source] || { label: item.source || "", color:"#888" };
            const badge = src.label
                ? `<span class="source-badge" style="background:${src.color}22; color:${src.color}; border:1px solid ${src.color}44;">${src.label}</span>`
                : "";
            const tag       = `<span class="news-tag" style="background:${col.bg}; color:${col.text}; border:1px solid ${col.hex}44;">${key}</span>`;
            const date      = (item.date||'').slice(0, 10);
            const shortDate = (item.date||'').slice(5, 10);

            if (IS_MOBILE) {
                return `<div class="news-item">
                    <div class="news-item-row1">${tag}${badge}</div>
                    <div class="news-item-row2">
                        <a class="news-text" href="${item.link||'#'}" target="_blank" rel="noopener">${item.title}</a>
                        <span class="news-date">${shortDate}</span>
                    </div>
                </div>`;
            } else {
                return `<div class="news-item">
                    ${tag}${badge}
                    <a class="news-text" href="${item.link||'#'}" target="_blank" rel="noopener">${item.title}</a>
                    <span class="news-date">${date}</span>
                </div>`;
            }
        }).join('');

        if (totalPages <= 1) { pageEl.innerHTML = ''; return; }

        const prefix = elId.includes('competitor') ? 'c' : 't';
        let btnHtml  = '';
        btnHtml += `<button class="page-btn" ${page <= 1 ? 'disabled' : ''} onclick="goPage('${prefix}', ${page - 1})">◀</button>`;
        for (let i = 1; i <= totalPages; i++) {
            if (i === 1 || i === totalPages || (i >= page - 2 && i <= page + 2)) {
                btnHtml += `<button class="page-btn ${i === page ? 'on' : ''}" onclick="goPage('${prefix}', ${i})">${i}</button>`;
            } else if (i === page - 3 || i === page + 3) {
                btnHtml += `<span class="page-info">...</span>`;
            }
        }
        btnHtml += `<button class="page-btn" ${page >= totalPages ? 'disabled' : ''} onclick="goPage('${prefix}', ${page + 1})">▶</button>`;
        btnHtml += `<span class="page-info">${page} / ${totalPages} 페이지 (총 ${data.length}건)</span>`;
        pageEl.innerHTML = btnHtml;
    }

    function goPage(prefix, page) {
        if (prefix === 'c') {
            cPage = page;
            renderNewsList('competitorNews', 'competitorPagination', getFiltered('c'), 'company', C_COLORS, cPage);
        } else {
            tPage = page;
            renderNewsList('trendNews', 'trendPagination', getFiltered('t'), 'category', T_COLORS, tPage);
        }
        document.querySelector('.news-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
</script>
</body>
</html>
