<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>경쟁사 동향 모니터링</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; background: #0f1117; color: #e0e0e0; min-height: 100vh; }

        header { background: #1a1d2e; border-bottom: 1px solid #2a2d3e; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
        header h1 { font-size: 17px; font-weight: 700; color: #fff; }
        header h1 span { color: #4f8ef7; margin-right: 8px; }
        .update-time { font-size: 12px; color: #666; }

        .container { max-width: 1400px; margin: 0 auto; padding: 24px 32px; }

        /* 상단 메트릭 카드 */
        .metric-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 20px; }
        .metric { background: #1a1d2e; border: 1px solid #2a2d3e; border-radius: 10px; padding: 16px 18px; cursor: pointer; transition: border-color 0.2s; }
        .metric:hover { border-color: #4f8ef7; }
        .metric-label { font-size: 12px; color: #888; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .metric-value { font-size: 26px; font-weight: 700; color: #fff; }
        .metric-sub { font-size: 11px; color: #4fcff7; margin-top: 4px; }

        /* 차트 영역 */
        .chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }
        .chart-card { background: #1a1d2e; border: 1px solid #2a2d3e; border-radius: 10px; padding: 18px 20px; }
        .chart-title { font-size: 12px; font-weight: 600; color: #aaa; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.5px; }

        /* 레전드 */
        .legend-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
        .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #aaa; }
        .legend-sq { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }

        /* 뉴스 카드 */
        .news-card { background: #1a1d2e; border: 1px solid #2a2d3e; border-radius: 10px; padding: 18px 20px; }
        .news-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
        .news-card-title { font-size: 12px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }

        /* 필터 버튼 */
        .filter-bar { display: flex; gap: 6px; flex-wrap: wrap; }
        .f-btn { font-size: 11px; padding: 4px 12px; border-radius: 12px; border: 1px solid #2a2d3e; background: transparent; color: #888; cursor: pointer; transition: all 0.15s; }
        .f-btn:hover { border-color: #4f8ef7; color: #fff; }
        .f-btn.on { background: #4f8ef7; border-color: #4f8ef7; color: #fff; }

        /* 뉴스 아이템 */
        .news-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid #22253a; }
        .news-item:last-child { border-bottom: none; }
        .news-tag { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 10px; white-space: nowrap; flex-shrink: 0; }
        .news-text { font-size: 13px; color: #ccc; line-height: 1.5; flex: 1; text-decoration: none; }
        .news-text:hover { color: #fff; }
        .news-date { font-size: 11px; color: #555; white-space: nowrap; flex-shrink: 0; }

        .empty { text-align: center; padding: 40px; font-size: 13px; color: #555; }
    </style>
</head>
<body>

<header>
    <h1><span>🛡</span> 경쟁사 동향 모니터링 대시보드</h1>
    <div class="update-time" id="updateTime">데이터 로딩 중...</div>
</header>

<div class="container">
    <div class="metric-row" id="metricRow"></div>

    <div class="chart-row">
        <div class="chart-card">
            <div class="chart-title">회사별 기사 비중</div>
            <div style="position:relative; height:200px;">
                <canvas id="donutChart" role="img" aria-label="회사별 기사 비중 도넛 차트">회사별 기사 건수 비중</canvas>
            </div>
            <div class="legend-row" id="donutLegend"></div>
        </div>
        <div class="chart-card">
            <div class="chart-title">회사별 수집 건수</div>
            <div style="position:relative; height:200px;">
                <canvas id="barChart" role="img" aria-label="회사별 수집 건수 막대 차트">회사별 기사 건수</canvas>
            </div>
        </div>
    </div>

    <div class="news-card">
        <div class="news-header">
            <div class="news-card-title">최신 기사 목록</div>
            <div class="filter-bar" id="filterBar"></div>
        </div>
        <div id="newsList"></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
    const COMPANIES = ["시큐아이", "안랩", "넥스지", "퓨처시스템", "윈스"];
    const COLORS = {
        "시큐아이":   { hex: "#e84393", bg: "#e8439322", text: "#e84393" },
        "안랩":       { hex: "#f7844f", bg: "#f7844f22", text: "#f7844f" },
        "넥스지":     { hex: "#4fcff7", bg: "#4fcff722", text: "#4fcff7" },
        "퓨처시스템": { hex: "#a14ff7", bg: "#a14ff722", text: "#a14ff7" },
        "윈스":       { hex: "#4ff77a", bg: "#4ff77a22", text: "#4ff77a" }
    };

    let allData = [];
    let currentFilter = "전체";
    let donutChart, barChart;

    // 데이터 로드
    fetch('./data.json?t=' + Date.now())
        .then(r => r.json())
        .then(data => {
            allData = data;
            renderAll(data);
            const now = new Date();
            document.getElementById('updateTime').textContent =
                `마지막 업데이트: ${now.toLocaleDateString('ko-KR')} ${now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })}`;
        })
        .catch(() => {
            document.getElementById('newsList').innerHTML =
                '<div class="empty">⚠️ data.json을 불러올 수 없습니다.<br>Actions 탭에서 로봇을 먼저 실행해주세요.</div>';
        });

    function renderAll(data) {
        renderMetrics(data);
        renderDonut(data);
        renderBar(data);
        renderFilters();
        renderNews(data);
    }

    // 메트릭 카드
    function renderMetrics(data) {
        const today = new Date().toISOString().slice(0, 10);
        document.getElementById('metricRow').innerHTML = COMPANIES.map(c => {
            const total = data.filter(d => d.company === c).length;
            const todayCnt = data.filter(d => d.company === c && (d.date || '').startsWith(today)).length;
            const col = COLORS[c];
            return `<div class="metric" onclick="setFilter('${c}')">
                <div class="metric-label">
                    <span class="dot" style="background:${col.hex}"></span>${c}
                </div>
                <div class="metric-value">${total}</div>
                <div class="metric-sub">오늘 신규 ${todayCnt}건</div>
            </div>`;
        }).join('');
    }

    // 도넛 차트
    function renderDonut(data) {
        const counts = COMPANIES.map(c => data.filter(d => d.company === c).length);
        const hexes = COMPANIES.map(c => COLORS[c].hex);
        const total = counts.reduce((a, b) => a + b, 0);

        if (donutChart) donutChart.destroy();
        donutChart = new Chart(document.getElementById('donutChart'), {
            type: 'doughnut',
            data: {
                labels: COMPANIES,
                datasets: [{
                    data: counts,
                    backgroundColor: hexes,
                    borderWidth: 2,
                    borderColor: '#1a1d2e',
                    hoverOffset: 8
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                cutout: '65%',
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: ctx => {
                                const pct = total > 0 ? Math.round(ctx.raw / total * 100) : 0;
                                return ` ${ctx.raw}건 (${pct}%)`;
                            }
                        }
                    }
                }
            }
        });

        document.getElementById('donutLegend').innerHTML = COMPANIES.map((c, i) => {
            const pct = total > 0 ? Math.round(counts[i] / total * 100) : 0;
            return `<span class="legend-item">
                <span class="legend-sq" style="background:${hexes[i]}"></span>
                ${c} ${pct}%
            </span>`;
        }).join('');
    }

    // 막대 차트
    function renderBar(data) {
        const counts = COMPANIES.map(c => data.filter(d => d.company === c).length);
        const hexes = COMPANIES.map(c => COLORS[c].hex);

        if (barChart) barChart.destroy();
        barChart = new Chart(document.getElementById('barChart'), {
            type: 'bar',
            data: {
                labels: COMPANIES,
                datasets: [{
                    data: counts,
                    backgroundColor: hexes,
                    borderRadius: 5,
                    borderSkipped: false,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: {
                        grid: { display: false },
                        ticks: { color: '#666', font: { size: 11 } }
                    },
                    y: {
                        beginAtZero: true,
                        grid: { color: 'rgba(255,255,255,0.05)' },
                        ticks: { color: '#666', font: { size: 11 }, stepSize: 1 }
                    }
                }
            }
        });
    }

    // 필터 버튼
    function renderFilters() {
        const all = ["전체", ...COMPANIES];
        document.getElementById('filterBar').innerHTML = all.map(c =>
            `<button class="f-btn ${c === currentFilter ? 'on' : ''}" onclick="setFilter('${c}')">${c}</button>`
        ).join('');
    }

    function setFilter(company) {
        currentFilter = company;
        renderFilters();
        const filtered = company === "전체" ? allData : allData.filter(d => d.company === company);
        renderNews(filtered);
    }

    // 뉴스 목록
    function renderNews(data) {
        const list = document.getElementById('newsList');
        if (!data.length) {
            list.innerHTML = '<div class="empty">📭 수집된 기사가 없습니다.</div>';
            return;
        }
        list.innerHTML = data.slice(0, 20).map(item => {
            const col = COLORS[item.company] || { hex: '#888', bg: '#88888822', text: '#888' };
            const href = item.link || '#';
            return `<div class="news-item">
                <span class="news-tag" style="background:${col.bg}; color:${col.text}; border: 1px solid ${col.hex}44;">${item.company}</span>
                <a class="news-text" href="${href}" target="_blank" rel="noopener">${item.title}</a>
                <span class="news-date">${(item.date || '').slice(0, 10)}</span>
            </div>`;
        }).join('');
    }
</script>
</body>
</html>
